name: BuildAndTestBinskim
trigger:
  - "*"

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release 

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: guardian-build-infra-windows-x64
      os: windows
    featureFlags:
      autoEnableRoslynWithNewRuleset: false
    stages:
    - stage: BuildAndTest
      displayName: Build And Test
      jobs:
        - job: build
          strategy:
            matrix:
              linux:
                poolName: guardian-build-infra-linux-x64
                poolOS: linux
                buildScript: ./BuildAndTest.sh
                runComponentGovernance: 'false'
              windows:
                poolName: guardian-build-infra-windows-x64
                poolOS: windows
                buildScript: BuildAndTest.cmd
                runComponentGovernance: 'true'
          pool:
            name: $(poolName)
            os: $(poolOS)
          steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: .NET Core 9 sdk
            inputs:
              version: "9.0.x"
              packageType: sdk

          - task: DotNetCoreCLI@2
            displayName: "Create nuget.config"
            inputs:
              command: custom
              custom: new
              arguments: nuget.config

          - task: DotNetCoreCLI@2
            displayName: "Add BinSkim.Build source"
            inputs:
              command: custom
              custom: nuget
              arguments: "add source -n BinSkim.Build https://pkgs.dev.azure.com/mseng/1ES/_packaging/BinSkim.Build/nuget/v3/index.json"

          - task: DotNetCoreCLI@2
            displayName: "Disable default nuget source"
            inputs:
              command: custom
              custom: nuget
              arguments: "disable source nuget"

          - task: CmdLine@2
            displayName: "Ensure BuildAndTest.sh is executable (Linux)"
            condition: eq(variables['poolOS'], 'linux')
            inputs:
              script: chmod +x ./BuildAndTest.sh

          - task: CmdLine@2
            displayName: "Build and Test"
            inputs:
              script: $(buildScript)

          - task: ComponentGovernanceComponentDetection@0
            condition: eq(variables['runComponentGovernance'], 'true')

    # Verify all PRs referenced in this release have been merged to main.
    - stage: ValidateReleasePRs
      displayName: Validate Release PRs
      dependsOn: []
      jobs:
      - job: CheckPRsMerged
        displayName: Check all release PRs are merged
        pool:
          name: guardian-build-infra-windows-x64
          os: windows
        steps:
        - checkout: self
          fetchDepth: 1

        - task: PowerShell@2
          displayName: "Verify referenced PRs are merged"
          inputs:
            targetType: inline
            pwsh: true
            script: |
              # Extract PR numbers from the latest release section in ReleaseHistory.md.
              $releaseHistory = Get-Content "$(Build.SourcesDirectory)/ReleaseHistory.md" -Raw
              $versionSections = $releaseHistory -split '(?=## \*\*v)'
              $latestSection = $versionSections | Where-Object { $_ -match '## \*\*v\d' } | Select-Object -First 1
              $prNumbers = [regex]::Matches($latestSection, '\[(\d+)\]\(https://github\.com/microsoft/binskim/pull/\d+\)') |
                ForEach-Object { [int]$_.Groups[1].Value }

              if ($prNumbers.Count -eq 0) {
                Write-Error "No PR references found in latest release section of ReleaseHistory.md"
                exit 1
              }

              Write-Host "PRs referenced in release: $($prNumbers -join ', ')"

              $repo = "microsoft/binskim"
              $failed = @()

              foreach ($pr in $prNumbers) {
                $url = "https://api.github.com/repos/$repo/pulls/$pr"
                $response = Invoke-RestMethod -Uri $url -Headers @{
                  "Accept" = "application/vnd.github+json"
                  "User-Agent" = "BinSkim-Release-Validation"
                }

                if ($response.merged -eq $true) {
                  Write-Host "✅ PR #$pr — merged"
                } else {
                  Write-Host "❌ PR #$pr — state: $($response.state), merged: $($response.merged)"
                  $failed += $pr
                }
              }

              if ($failed.Count -gt 0) {
                Write-Error "The following PRs are not yet merged: $($failed -join ', '). Merge them before releasing."
                exit 1
              }

              Write-Host "All release PRs are merged."

    # Trigger internal BinSkimInternal pipeline in parallel; block PR if it fails.
    - stage: InternalValidation
      displayName: Internal Validation
      dependsOn: []  # Run in parallel with BuildAndTest
      jobs:
      - job: TriggerInternalBuild
        displayName: Trigger and wait for internal build
        pool:
          name: guardian-build-infra-windows-x64
          os: windows
        steps:
        - checkout: none

        - task: PowerShell@2
          displayName: "Queue internal build and wait for result"
          inputs:
            targetType: inline
            pwsh: true
            script: |
              $commit = "$(Build.SourceVersion)"
              $org = "https://dev.azure.com/mseng/"
              $project = "1ES"
              $pipelineId = 21327  # 1ES.BuildAndTest.BinskimInternal

              Write-Host "Triggering internal build with BinSkim commit: $commit"

              $headers = @{
                Authorization  = "Bearer $(System.AccessToken)"
                "Content-Type" = "application/json"
              }

              $body = @{
                templateParameters = @{
                  binskimCommit = $commit
                }
              } | ConvertTo-Json -Depth 5

              $runUrl = "${org}${project}/_apis/pipelines/${pipelineId}/runs?api-version=7.0"
              $run = Invoke-RestMethod -Uri $runUrl -Method Post -Headers $headers -Body $body
              $runId = $run.id

              Write-Host "Queued run #$runId"
              Write-Host "Portal: $($run._links.web.href)"

              # Poll until the run completes
              $pollInterval = 30
              $maxWait = 7200  # 2 hours
              $elapsed = 0

              do {
                Start-Sleep -Seconds $pollInterval
                $elapsed += $pollInterval

                $statusUrl = "${org}${project}/_apis/pipelines/${pipelineId}/runs/${runId}?api-version=7.0"
                $status = Invoke-RestMethod -Uri $statusUrl -Headers $headers

                Write-Host "[$elapsed s] Run #$runId — state: $($status.state), result: $($status.result)"

                if ($status.state -eq "completed") {
                  if ($status.result -eq "succeeded") {
                    Write-Host "Internal build succeeded."
                    exit 0
                  } else {
                    Write-Error "Internal build finished with result: $($status.result). See: $($run._links.web.href)"
                    exit 1
                  }
                }
              } while ($elapsed -lt $maxWait)

              Write-Error "Timed out after ${maxWait}s waiting for internal build. See: $($run._links.web.href)"
              exit 1
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)
