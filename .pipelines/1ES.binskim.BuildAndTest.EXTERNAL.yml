name: BuildAndTestBinskim
trigger:
  - "*"

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release 

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: guardian-build-infra-windows-x64-dev
      os: windows
    featureFlags:
      autoEnableRoslynWithNewRuleset: false
    stages:
    - stage: stage1
      displayName: Build And Test
      jobs:
        - job: build
          strategy:
            matrix:
              linux:
                poolName: guardian-build-infra-linux-x64-dev
                poolOS: linux
                buildScript: ./BuildAndTest.sh
                runComponentGovernance: 'false'
              windows:
                poolName: guardian-build-infra-windows-x64-dev
                poolOS: windows
                buildScript: BuildAndTest.cmd
                runComponentGovernance: 'true'
          pool:
            name: $(poolName)
            os: $(poolOS)
          steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: .NET Core 9 sdk
            inputs:
              version: "9.0.x"
              packageType: sdk

          - task: DotNetCoreCLI@2
            displayName: "Create nuget.config"
            inputs:
              command: custom
              custom: new
              arguments: nuget.config

          - task: DotNetCoreCLI@2
            displayName: "Add BinSkim.Build source"
            inputs:
              command: custom
              custom: nuget
              arguments: "add source -n BinSkim.Build https://pkgs.dev.azure.com/mseng/1ES/_packaging/BinSkim.Build/nuget/v3/index.json"

          - task: DotNetCoreCLI@2
            displayName: "Disable default nuget source"
            inputs:
              command: custom
              custom: nuget
              arguments: "disable source nuget"

          - task: CmdLine@2
            displayName: "Ensure BuildAndTest.sh is executable (Linux)"
            condition: eq(variables['poolOS'], 'linux')
            inputs:
              script: chmod +x ./BuildAndTest.sh

          - task: CmdLine@2
            displayName: "Build and Test"
            inputs:
              script: $(buildScript)

          - task: ComponentGovernanceComponentDetection@0
            condition: eq(variables['runComponentGovernance'], 'true')
